name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install static checker
        run: python -m pip install ruff==0.12.5
      - name: Compile
        run: python -m compileall -q .
      - name: Unit tests
        run: python -m unittest discover -v
      - name: Ruff
        run: ruff check .
